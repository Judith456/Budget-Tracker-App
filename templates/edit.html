<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Transaction – Budget Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg1: rgba(37, 99, 235, .20);
      --bg2: rgba(16, 185, 129, .16);
      --cardBorder: rgba(15, 23, 42, .10);
      --text: #0f172a;
      --muted: #64748b;
    }

    body{
      background: radial-gradient(1000px 500px at 20% 10%, var(--bg1), transparent 55%),
                  radial-gradient(800px 450px at 90% 20%, var(--bg2), transparent 55%),
                  #f3f6f9;
      color: var(--text);
    }

    .page-center{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .app-shell{
      background: rgba(255,255,255,.78);
      border: 1px solid var(--cardBorder);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 18px 60px rgba(2, 6, 23, .10);
      max-width: 480px;
      width: 100%;
    }

    .app-title{
      font-weight: 900;
      letter-spacing: .2px;
      text-align: center;
    }

    .form-control, .form-select{
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, .15);
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .form-label{
      font-weight: 700;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 4px;
    }

    .btn-primary{
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
    }
    .btn-primary:hover{
      filter: brightness(0.98);
      transform: translateY(-1px);
      transition: all .15s ease;
    }

    .btn-cancel{
      border-radius: 12px;
      font-weight: 800;
      border: 1px solid rgba(15, 23, 42, .15);
      background: rgba(15, 23, 42, .04);
      color: var(--muted);
      padding: 10px 14px;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-cancel:hover{
      background: rgba(15, 23, 42, .08);
      color: var(--text);
    }

    .badge-income{
      background: rgba(16, 185, 129, .12);
      color: #047857;
      border: 1px solid rgba(16, 185, 129, .25);
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .85rem;
    }
    .badge-expense{
      background: rgba(239, 68, 68, .12);
      color: #b91c1c;
      border: 1px solid rgba(239, 68, 68, .25);
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .85rem;
    }
  </style>
</head>

<body>
  <div class="page-center">
    <div class="container app-shell">

      <!-- Header -->
      <div class="text-center mb-4">
        <h2 class="app-title mb-1">Edit Transaction</h2>
        <p class="text-secondary mb-0" style="font-weight:600;">
          Updating:
          <strong>{{ transaction.item }}</strong>
          &nbsp;
          {% if transaction.type == 'Income' %}
            <span class="badge-income">Income</span>
          {% else %}
            <span class="badge-expense">Expense</span>
          {% endif %}
        </p>
      </div>

      <!-- Edit Form -->
      <form action="/edit/{{ transaction.id }}" method="POST" class="row g-3">

        <div class="col-12">
          <label class="form-label" for="item">Item name</label>
          <input
            type="text"
            id="item"
            name="item"
            class="form-control"
            value="{{ transaction.item }}"
            placeholder="Item name"
            required
            maxlength="100"
          >
        </div>

        <div class="col-12">
          <label class="form-label" for="amount">Amount (Shs)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            class="form-control"
            value="{{ transaction.amount }}"
            step="0.01"
            placeholder="Amount"
            required
          >
        </div>

        <div class="col-12">
          <label class="form-label" for="type">Type</label>
          <select id="type" name="type" class="form-select" required>
            <option value="Income"  {{ 'selected' if transaction.type == 'Income'  }}>Income</option>
            <option value="Expense" {{ 'selected' if transaction.type == 'Expense' }}>Expense</option>
          </select>
        </div>

        <div class="col-12 mt-2">
          <button type="submit" class="btn btn-primary w-100 mb-2">
            Save Changes
          </button>
          <a href="/" class="btn-cancel">Cancel — go back</a>
        </div>

      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
